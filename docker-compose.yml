services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: joineazy_user
      POSTGRES_PASSWORD: joineazy_pass
      POSTGRES_DB: joineazy_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
      args:
        NODE_ENV: ${NODE_ENV}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - postgres
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - RUN_SCRIPT=${RUN_SCRIPT}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - DATABASE_DIALECT=${DATABASE_DIALECT}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_PORT=${DATABASE_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - SMTP_HOST_NR=${SMTP_HOST_NR}
      - SMTP_PORT_NR=${SMTP_PORT_NR}
      - SMTP_SECURE_NR=${SMTP_SECURE_NR}
      - SMTP_USERNAME_NR=${SMTP_USERNAME_NR}
      - SMTP_PASSWORD_NR=${SMTP_PASSWORD_NR}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT}
      - MONITORING_TOKEN=${MONITORING_TOKEN}
    volumes:
      - ./logs:/app/logs
    stdin_open: true
    restart: unless-stopped

volumes:
  postgres_data: